<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kenan & Almedina - Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    padding: 0;
    background-color: #f4efe6;
    font-family: 'Montserrat', sans-serif;
    color: #5c5346;
}

/* Invitation card */

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 80px 60px;
    background-color: #f8f1e7;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* border */

.container::before {
    content: "";
    position: absolute;
    inset: 0;
    border: 3px solid #6f8b74;
    pointer-events: none;
}

/* corner svg decorations */

.corner{
    position:absolute;
    width:170px;
    height:auto;
    pointer-events:none;
    opacity:0.95;
}

/* positions */

.top-left{
    top:-25px;
    left:-25px;
}

.top-right{
    top:-25px;
    right:-25px;
}

.bottom-left{
    bottom:-25px;
    left:-25px;
}

.bottom-right{
    bottom:-25px;
    right:-25px;
}

/* text styles */

.header{
    margin-top:30px;
    font-style:italic;
    font-size:18px;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:56px;
    font-weight:600;
    margin:15px 0;
}

.date{
    font-size:20px;
    letter-spacing:2px;
    margin-bottom:50px;
}

.section{
    margin:40px 0;
    font-style:italic;
}

h2{
    font-family:'Playfair Display',serif;
    font-size:28px;
    margin-bottom:15px;
}

.details{
    font-size:18px;
    line-height:1.8;
}

.footer{
    margin-top:60px;
    font-style:italic;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<!-- SVG CORNERS -->

<img src="top-left.svg" class="corner top-left">
<img src="top-right.svg" class="corner top-right">
<img src="bottom-left.svg" class="corner bottom-left">
<img src="bottom-right.svg" class="corner bottom-right">

<center>

<div class="header">
Pridružite nam se na ovaj specijalan dan
</div>

<h1>Kenan & Almedina</h1>

<div class="date">
Subota, 15.08.2026.
</div>

<div class="section">

<h2>Svečano vjenčanje</h2>

<div class="details">
Hotel Austria Bosnia, Ilidža<br>
18:00
</div>

</div>

<div class="footer">
Molimo vas da nas obavijestite o mogućnosti prisustvovanja do 31.06.2026.
</div>

</center>

</div>

</body>
</html>
