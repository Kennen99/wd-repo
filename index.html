<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kenan & Almedina - Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
padding:0;
background:#f4efe6;
font-family:'Montserrat',sans-serif;
color:#5c5346;
}

/* Container */

.container{
max-width:900px;
margin:40px auto;
padding:60px 40px;
background:#f8f1e7;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:hidden;
}

/* Floral corners */

.flower{
position:absolute;
width:160px;
height:160px;
}

.flower svg{
width:100%;
height:100%;
}

.top-left{top:-30px;left:-30px;}
.top-right{top:-30px;right:-30px;transform:scaleX(-1);}
.bottom-left{bottom:-30px;left:-30px;transform:scaleY(-1);}
.bottom-right{bottom:-30px;right:-30px;transform:scale(-1);}

/* Typography */

.header{
margin-top:40px;
font-style:italic;
font-size:16px;
}

h1{
font-family:'Playfair Display',serif;
font-size:56px;
margin-bottom:10px;
}

.date{
font-size:20px;
letter-spacing:2px;
margin-bottom:20px;
}

.section{
margin:40px 0;
font-style:italic;
}

h2{
font-family:'Playfair Display',serif;
font-size:28px;
margin-bottom:15px;
}

.details{
font-size:18px;
line-height:1.8;
}

.footer{
margin-top:50px;
font-style:italic;
font-size:16px;
}

.countdown{
font-size:20px;
letter-spacing:2px;
margin-top:10px;
}

/* Fade animation */

.fade{
opacity:0;
transform:translateY(20px);
animation:fadeUp 1.2s ease forwards;
}

.fade:nth-child(1){animation-delay:0.2s;}
.fade:nth-child(2){animation-delay:0.5s;}
.fade:nth-child(3){animation-delay:0.8s;}
.fade:nth-child(4){animation-delay:1.1s;}
.fade:nth-child(5){animation-delay:1.4s;}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* Map */

#map{
height:400px;
max-width:900px;
margin:40px auto;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
opacity:0;
animation:fadeUp 1.5s ease forwards;
animation-delay:1.6s;
}

/* Mobile */

@media (max-width:600px){

.container{
padding:40px 20px;
margin:20px;
}

h1{
font-size:40px;
}

.details{
font-size:16px;
}

.flower{
width:110px;
height:110px;
}

#map{
height:300px;
margin:30px 20px;
}

}

/* Envelope Wrapper */

#envelopeWrapper{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4efe6;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

/* Envelope */

.envelope{
position:relative;
width:90vw;
height:85vh;
max-width:900px;
background:#6f6e50;
border-radius:6px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
overflow:hidden;
}

/* Envelope Body */

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:#6f6e50;
}

/* Envelope Lid */

.envelope-lid{
position:absolute;
top:0;
left:0;
width:100%;
height:50%;
background:#5e5d43;
clip-path:polygon(0 0, 50% 100%, 100% 0);
transform-origin:top;
transition:transform 1.2s ease;
}

/* Open animation */

.envelope.open .envelope-lid{
transform:rotateX(180deg);
}

/* Wax Seal */

.wax-seal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
width:110px;
height:110px;
border-radius:50%;

background:radial-gradient(circle at 30% 30%, #f7e08a, #caa53a, #9f7c22);

display:flex;
align-items:center;
justify-content:center;

font-family:'Playfair Display',serif;
font-size:16px;
letter-spacing:2px;

color:#5c5346;

box-shadow:
0 6px 10px rgba(0,0,0,0.3),
inset 0 3px 5px rgba(255,255,255,0.4),
inset 0 -4px 6px rgba(0,0,0,0.25);

cursor:pointer;
transition:transform 0.2s ease;
}

.wax-seal:hover{
transform:translate(-50%, -50%) scale(1.05);
}

/* Hide invitation initially */

.hidden{
display:none;
}

</style>
</head>

<body>

<div id="envelopeWrapper">
  <div class="envelope" onclick="openEnvelope()">
    <div class="envelope-lid"></div>
    <div class="envelope-body"></div>
    
    <div class="wax-seal" onclick="openEnvelope()">
      OPEN
    </div>
  </div>
</div>

<div id="invitation" class="hidden">
<div class="container">

<!-- Floral Corners -->

<div class="flower top-left">
<svg viewBox="0 0 200 200">
<path fill="#6f8b74" opacity="0.35"
d="M100 10c20 30 40 40 60 50s20 40 0 60-40 20-60 50c-20-30-40-40-60-50s-20-40 0-60 40-20 60-50z"/>
</svg>
</div>

<div class="flower top-right">
<svg viewBox="0 0 200 200">
<path fill="#6f8b74" opacity="0.35"
d="M100 10c20 30 40 40 60 50s20 40 0 60-40 20-60 50c-20-30-40-40-60-50s-20-40 0-60 40-20 60-50z"/>
</svg>
</div>

<div class="flower bottom-left">
<svg viewBox="0 0 200 200">
<path fill="#6f8b74" opacity="0.35"
d="M100 10c20 30 40 40 60 50s20 40 0 60-40 20-60 50c-20-30-40-40-60-50s-20-40 0-60 40-20 60-50z"/>
</svg>
</div>

<div class="flower bottom-right">
<svg viewBox="0 0 200 200">
<path fill="#6f8b74" opacity="0.35"
d="M100 10c20 30 40 40 60 50s20 40 0 60-40 20-60 50c-20-30-40-40-60-50s-20-40 0-60 40-20 60-50z"/>
</svg>
</div>

<center>

<div class="fade header">
Pridružite nam se na ovaj specijalan dan
</div>

<div class="fade">
<h1>Kenan & Almedina</h1>
</div>

<div class="fade date">
Subota, 15.08.2026.
</div>

<div class="fade countdown" id="countdown"></div>

<div class="fade section">
<h2>Wedding Ceremony</h2>

<div class="details">
Hotel Austria Bosnia, Ilidža<br>
18:00
</div>

</div>

</center>

</div>

<!-- Map -->

<div id="map"></div>

<!-- RSVP + Image -->

<div class="container fade">

<center>

<div class="footer">
Molimo vas da nas obavjestite o mogućnosti prisustvovanja do 30.6.2026.
</div>

<br><br>

<img src="placeholder.jpg" style="max-width:100%; border-radius:8px;">

</center>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* Countdown */

const weddingDate = new Date("Aug 15, 2026 18:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
days+" days "+hours+" hours "+minutes+" minutes";

},1000);


/* Map */

const venueLat = 43.82993;
const venueLng = 18.30713;

const map = L.map('map').setView([venueLat, venueLng], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
}).addTo(map);

L.marker([venueLat, venueLng])
.addTo(map)
.bindPopup('<b>Wedding Location</b><br><a target="_blank" href="https://maps.google.com/?q=43.82993,18.30713">Open in Google Maps</a>')
.openPopup();

function openEnvelope(){

const envelope = document.querySelector(".envelope");

envelope.classList.add("open");

setTimeout(() => {

document.getElementById("envelopeWrapper").style.display = "none";
document.getElementById("invitation").classList.remove("hidden");

},1000);

}

</script>
</div>
</body>
</html>
