<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kenan & Almedina - Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
padding:0;
background:#e8dfcf;
font-family:'Montserrat',sans-serif;
color:#5c5346;
}

/* Container */

.container{
max-width:900px;
margin:40px auto;
padding:60px 40px;
background:#efe5d3;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:hidden;
}

/* Floral corners */

.corner {
    position: absolute;
    width: 160px;
    height: auto;
    pointer-events: none;
    color:#6f8b74;
    opacity:0.85;
    filter: invert(45%) sepia(10%) saturate(500%) hue-rotate(80deg);

}

/* positioning */
.bottom-left {
    width: 50%;
    height: 50%;
}

.bottom-right {
    width: 50%;
    height: 50%;
}

.bottom-left{bottom:0px;left:-38px;}
.bottom-right{bottom:0px;right:-38px;transform:scaleX(-1);}

/* Typography */

.header{
margin-top:50x;
font-style:italic;
font-size:16px;
}

h1{
font-family:'Playfair Display',serif;
font-size:56px;
margin-bottom:10px;
}

.date{
font-size:20px;
letter-spacing:2px;
margin-bottom:20px;
}

.section{
margin:40px 0;
font-style:italic;
}

h2{
font-family:'Playfair Display',serif;
font-size:28px;
margin-bottom:15px;
}

.details{
font-size:18px;
line-height:1.8;
}

.footer{
margin-top:50px;
font-style:italic;
font-size:14px;
}


/* Fade animation */

.fade{
opacity:0;
transform:translateY(20px);
animation:fadeUp 1.2s ease forwards;
}

.fade:nth-child(1){animation-delay:0.2s;}
.fade:nth-child(2){animation-delay:0.5s;}
.fade:nth-child(3){animation-delay:0.8s;}
.fade:nth-child(4){animation-delay:1.1s;}
.fade:nth-child(5){animation-delay:1.4s;}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* Map */

#map{
height:400px;
max-width:900px;
margin:40px auto;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
opacity:0;
animation:fadeUp 1.5s ease forwards;
animation-delay:1.6s;
}

/* Mobile */

@media (max-width:600px){

.container{
padding:40px 20px;
margin:20px;
}

h1{
font-size:48px;
}

.details{
font-size:16px;
}

#map{
height:300px;
margin:30px 20px;
}

}

/* Envelope Wrapper */

#envelopeWrapper{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4efe6;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

/* Envelope */

.envelope{
position:relative;
width:320px;
height:200px;
cursor:pointer;
width:100vw;
height:37vh;
}

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(to bottom, rgba(255,255,255,0.06), transparent 40%),
#6f6e50;
border-radius:6px;
box-shadow:0 12px 25px rgba(0,0,0,0.25);
background:linear-gradient(
    145deg,
    #6f6e50,
    #6f6e50
  );
}

/* Envelope lid */

.envelope-lid{
position:absolute;
top:0;
left:0;
width:100%;
height:75%;
background:#5e5d43;
clip-path:polygon(0 0, 50% 40%, 100% 0);
transform-origin:top;
transition:transform 2s ease;
border-radius:6px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* bottom triangle fold */
.envelope-body::before{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:50%;
  background:rgba(255,255,255,0.06);
  clip-path:polygon(0 100%, 50% 0, 100% 100%);
}

/* top triangle fold */
.envelope-body::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  background:rgba(0,0,0,0.05);
  clip-path:polygon(0 0, 50% 100%, 100% 0);
}


/* Open animation */

.envelope.open .envelope-lid{
transform:rotateX(180deg);
}

/* Text */

.invite-text{
position:absolute;
top: 10%;
left:50%;
transform:translate(-50%, -50%);
width:20%;
transition: opacity 0.6s ease; /* fade animation */
}

.invite-text.fade-out{
  opacity:0;
}

.invite-icon{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  width:35%;
  animation: bounce 1.5s infinite;
  transition: opacity 0.6s ease; /* fade animation */
}

.invite-icon.fade-out{
  opacity:0;
}

/* Hide invitation initially */

.hidden{
display:none;
}

</style>
</head>

<body>

<div id="envelopeWrapper">
  <div class="envelope" onclick="openEnvelope()">
    <div class="envelope-lid"></div>
    <div class="envelope-body"></div>
    
    <img src="klik.svg" class="invite-text">
    <img src="pecat.svg" class="invite-icon">
  </div>
</div>

<div id="invitation" class="hidden">
    <div class="container">

        <!-- Floral Corners -->
        <img src="bottom-left.svg" class="corner bottom-left">
        <img src="bottom-left.svg" class="corner bottom-right">

        <center>

            <div class="fade">
                <h1>K | A</h1><br/><br/>
            </div>

            <div class="fade header">
                Pridružite nam se na ovaj specijalan dan<br/><br/><br/>
            </div>

            <div class="fade">
                <h2>Kenan & <br/>Almedina</h2><br/><br/><br/><br/><br/><br/>
            </div>
            

        </center>

    </div>

    <div class="container">

        <img src="bottom-left.svg" class="corner bottom-left">
        <img src="bottom-left.svg" class="corner bottom-right">

        <center>
            <div class="fade section">
                <div class="details">
                    <h2>Hotel Austria Bosna, Ilidža</h2><br/>
                </div>
            </div>

            <div class="fade date">
                <h2>Subota, 15.08.2026.</h2>
            </div>

            <div class="fade section">
                <div class="details">
                    <h2>17:30h</h2><br/><br/><br/><br/>
                </div>
            </div>

            <div class="footer">
                <h3>Molimo vas da nas obavjestite o mogućnosti prisustvovanja do 30.5.2026.</h3>
            </div>

        </center>
    </div>

    <!-- Map -->

    <div id="map"></div>

</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* Map */

const venueLat = 43.8260952;
const venueLng = 18.305616;

function openEnvelope(){
    const envelope = document.querySelector(".envelope");
    const icon = document.querySelector(".invite-icon");
    const text = document.querySelector(".invite-text");

    icon.classList.add("fade-out"); // fade the seal
    text.classList.add("fade-out"); // fade the seal

    envelope.classList.add("open");

    setTimeout(() => {

        document.getElementById("envelopeWrapper").style.display = "none";
        const invitation = document.getElementById("invitation");
        invitation.classList.remove("hidden");

        // Fix Leaflet map rendering
        const map = L.map('map').setView([venueLat, venueLng], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
            maxZoom:19,
        }).addTo(map);

        L.marker([venueLat, venueLng])
        .addTo(map)
        .bindPopup('<b>Wedding Location</b><br><a target="_blank" href="https://maps.google.com/?q=43.8260952,18.305616">Open in Google Maps</a>')
        .openPopup();

        map.invalidateSize(); // force Leaflet to render properly

    },2000);
}

</script>

</body>
</html>
