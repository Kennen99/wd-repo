<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kenan & Almedina - Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
padding:0;
background:#f4efe6;
font-family:'Montserrat',sans-serif;
color:#5c5346;
}

.container{
max-width:900px;
margin:40px auto;
padding:60px 40px;
background:#f8f1e7;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:hidden;
}

/* Floral SVG corners */

.flower{
position:absolute;
width:160px;
opacity:0.9;
}

.top-left{top:-20px;left:-20px;}
.top-right{top:-20px;right:-20px;transform:scaleX(-1);}
.bottom-left{bottom:-20px;left:-20px;transform:scaleY(-1);}
.bottom-right{bottom:-20px;right:-20px;transform:scale(-1);}

/* Typography */

.header{
margin-top:40px;
font-style:italic;
font-size:16px;
}

h1{
font-family:'Playfair Display',serif;
font-size:56px;
margin-bottom:10px;
opacity:0;
animation:fadeIn 2s ease forwards;
}

.date{
font-size:20px;
letter-spacing:2px;
margin-bottom:30px;
}

.section{
margin:40px 0;
font-style:italic;
}

h2{
font-family:'Playfair Display',serif;
font-size:28px;
margin-bottom:15px;
}

.details{
font-size:18px;
line-height:1.8;
}

.footer{
margin-top:50px;
font-style:italic;
font-size:16px;
}

/* Countdown */

.countdown{
font-size:20px;
margin-top:20px;
letter-spacing:2px;
}

/* Map */

#map{
height:400px;
max-width:900px;
margin:40px auto;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Mobile */

@media (max-width:600px){

.container{
padding:40px 20px;
margin:20px;
}

h1{
font-size:40px;
}

.details{
font-size:16px;
}

.flower{
width:110px;
}

#map{
height:300px;
margin:30px 20px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- SVG Flower Corners -->

<img class="flower top-left" src="https://www.svgrepo.com/show/530437/floral.svg">
<img class="flower top-right" src="https://www.svgrepo.com/show/530437/floral.svg">
<img class="flower bottom-left" src="https://www.svgrepo.com/show/530437/floral.svg">
<img class="flower bottom-right" src="https://www.svgrepo.com/show/530437/floral.svg">

<center>

<div class="header">
Pridružite nam se na ovaj specijalan dan
</div>

<h1>Kenan & Almedina</h1>

<div class="date">Subota, 15.08.2026.</div>

<div class="countdown" id="countdown"></div>

<div class="section">

<h2>Wedding Ceremony</h2>

<div class="details">
Hotel Austria Bosnia, Ilidža<br>
18:00
</div>

</div>

<div class="footer">
Molimo vas da nas obavjestite o mogućnosti prisustvovanja do 30.6.2026.
</div>

</center>

</div>

<!-- Map -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
   WEDDING COUNTDOWN
========================= */

const weddingDate = new Date("Aug 15, 2026 18:00:00").getTime();

const timer = setInterval(function(){

const now = new Date().getTime();

const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
days+" days "+hours+" hours "+minutes+" min until we say YES";

},1000);


/* =========================
   INTERACTIVE MAP
========================= */

/*
CHANGE THESE COORDINATES
*/

const venueLat = 43.8257641;
const venueLng = 18.3049124;


/*
Map
*/

const map = L.map('map').setView([venueLat, venueLng], 18.25);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
}).addTo(map);

L.marker([venueLat, venueLng])
.addTo(map)
.bindPopup("Wedding Location")
.openPopup();

</script>

</body>
</html>
